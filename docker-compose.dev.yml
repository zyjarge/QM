
# QM P0 本地开发中间件栈
# 用法: docker compose -f docker-compose.dev.yml up -d
# 资源预算(2C4G 云机也能跑): 总内存上限 ~2.2G

networks:
  qm-net:
    driver: bridge

volumes:
  qm-pg-data:
  qm-redis-data:
  qm-mq-data:
  qm-meili-data:
  qm-minio-data:

services:
  postgres:
    image: pgvector/pgvector:pg16  # 自带 vector 扩展 (PG16 + pgvector)
    container_name: qm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: qm
      POSTGRES_USER: qm
      POSTGRES_PASSWORD: qm_dev_2026
      TZ: Asia/Shanghai
    ports:
      - "5432:5432"
    volumes:
      - qm-pg-data:/var/lib/postgresql/data
      - ./initdb:/docker-entrypoint-initdb.d:ro
    networks: [qm-net]
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qm -d qm"]
      interval: 10s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: qm-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - qm-redis-data:/data
    networks: [qm-net]
    deploy:
      resources:
        limits:
          memory: 320M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: qm-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: qm
      RABBITMQ_DEFAULT_PASS: qm_dev_2026
      TZ: Asia/Shanghai
    ports:
      - "5672:5672"     # AMQP
      - "15672:15672"   # 管理台 http://localhost:15672 (qm/qm_dev_2026)
    volumes:
      - qm-mq-data:/var/lib/rabbitmq
    networks: [qm-net]
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5

  meilisearch:
    image: getmeili/meilisearch:v1.8
    container_name: qm-meilisearch
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: qm_dev_master_key_2026
      MEILI_ENV: development
      MEILI_NO_ANALYTICS: "true"
    ports:
      - "7700:7700"     # http://localhost:7700
    volumes:
      - qm-meili-data:/meili_data
    networks: [qm-net]
    deploy:
      resources:
        limits:
          memory: 384M
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7700/health"]
      interval: 10s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: qm-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      # 注意: 不用宿主机继承,显式写死; 宿主机若存在 MINIO_* env 会干扰
      MINIO_ROOT_USER: qmadmin
      MINIO_ROOT_PASSWORD: qm_dev_2026_pass
      TZ: Asia/Shanghai
    ports:
      - "9000:9000"     # S3 API
      - "9001:9001"     # 控制台 http://localhost:9001
    volumes:
      - qm-minio-data:/data
    networks: [qm-net]
    deploy:
      resources:
        limits:
          memory: 384M
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 5s
      retries: 5

  # 首次启动后执行一次: 创建业务 bucket
  minio-init:
    image: minio/mc:latest
    container_name: qm-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 qmadmin qm_dev_2026_pass;
      mc mb -p local/qm-attachments || true;
      mc mb -p local/qm-archives || true;
      mc anonymous set none local/qm-attachments;
      mc anonymous set none local/qm-archives;
      echo '>>> buckets ready';
      "
    networks: [qm-net]
    restart: "no"
